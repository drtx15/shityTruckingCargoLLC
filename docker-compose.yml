name: transit-grid

services:
  transit-grid-postgres:
    image: postgres:16-alpine
    container_name: transit-grid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transit_grid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transit_grid"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
